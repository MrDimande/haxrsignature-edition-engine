      <g id="mandala-center">
        <circle r="14" fill="url(#mandalaRadial)"/>
        <circle r="6" fill="#FFFFFF" opacity="0.35"/>
        <circle r="3" fill="#8C5A1A"/>
      </g>
      <g id="mandala-triangles" fill="url(#mandalaGold)" opacity="0.75">
        <path d="M0,-58 L6,-46 L-6,-46 Z"/>
        <path d="M0,58 L6,46 L-6,46 Z"/>
        <path d="M58,0 L46,6 L46,-6 Z"/>
        <path d="M-58,0 L-46,6 L-46,-6 Z"/>
        <path d="M41,-41 L47,-35 L35,-35 Z"/>
        <path d="M-41,-41 L-35,-35 L-47,-35 Z"/>
        <path d="M41,41 L47,35 L35,35 Z"/>
        <path d="M-41,41 L-35,35 L-47,35 Z"/>
      </g>

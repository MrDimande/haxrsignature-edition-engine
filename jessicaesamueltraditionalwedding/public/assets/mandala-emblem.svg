        <use href="#petal" transform="rotate(90)"/>
        <use href="#petal" transform="rotate(135)"/>
        <use href="#petal" transform="rotate(180)"/>
        <use href="#petal" transform="rotate(225)"/>
        <use href="#petal" transform="rotate(270)"/>
        <use href="#petal" transform="rotate(315)"/>
      </g>
      <g id="mandala-petals-inner" opacity="0.92">
        <use href="#petal" transform="rotate(22.5) scale(0.62)"/>
        <use href="#petal" transform="rotate(67.5) scale(0.62)"/>
        <use href="#petal" transform="rotate(112.5) scale(0.62)"/>
        <use href="#petal" transform="rotate(157.5) scale(0.62)"/>
        <use href="#petal" transform="rotate(202.5) scale(0.62)"/>
        <use href="#petal" transform="rotate(247.5) scale(0.62)"/>
        <use href="#petal" transform="rotate(292.5) scale(0.62)"/>
        <use href="#petal" transform="rotate(337.5) scale(0.62)"/>
      </g>
      <g id="mandala-diamonds" stroke="url(#mandalaGold)" stroke-width="1.8" fill="none">
        <rect x="-42" y="-42" width="84" height="84" transform="rotate(45)" rx="1"/>
        <rect x="-28" y="-28" width="56" height="56" transform="rotate(45)" rx="1"/>
        <rect x="-14" y="-14" width="28" height="28" transform="rotate(45)" rx="1"/>
      </g>
      <g id="mandala-rings" fill="none" stroke="url(#mandalaGold)">
        <circle r="72" stroke-width="1.5" opacity="0.7"/>
        <circle r="48" stroke-width="1.2" opacity="0.55"/>
        <circle r="24" stroke-width="1" opacity="0.45"/>

      <circle cx="256" cy="256" r="198" fill="none" stroke="#E8E0D4" stroke-width="0.5"/>
    </g>
    <g id="layer-05-mandala" transform="translate(256, 256)">
      <g id="mandala-dot-ring" opacity="0.85">
        <use href="#dot" transform="rotate(0) translate(0,-168)"/>
        <use href="#dot" transform="rotate(15) translate(0,-168)"/>
        <use href="#dot" transform="rotate(30) translate(0,-168)"/>
        <use href="#dot" transform="rotate(45) translate(0,-168)"/>
        <use href="#dot" transform="rotate(60) translate(0,-168)"/>
        <use href="#dot" transform="rotate(75) translate(0,-168)"/>
        <use href="#dot" transform="rotate(90) translate(0,-168)"/>
        <use href="#dot" transform="rotate(105) translate(0,-168)"/>
        <use href="#dot" transform="rotate(120) translate(0,-168)"/>
        <use href="#dot" transform="rotate(135) translate(0,-168)"/>
        <use href="#dot" transform="rotate(150) translate(0,-168)"/>
        <use href="#dot" transform="rotate(165) translate(0,-168)"/>
        <use href="#dot" transform="rotate(180) translate(0,-168)"/>
        <use href="#dot" transform="rotate(195) translate(0,-168)"/>
        <use href="#dot" transform="rotate(210) translate(0,-168)"/>
        <use href="#dot" transform="rotate(225) translate(0,-168)"/>
        <use href="#dot" transform="rotate(240) translate(0,-168)"/>
        <use href="#dot" transform="rotate(255) translate(0,-168)"/>
        <use href="#dot" transform="rotate(270) translate(0,-168)"/>
        <use href="#dot" transform="rotate(285) translate(0,-168)"/>
        <use href="#dot" transform="rotate(300) translate(0,-168)"/>
        <use href="#dot" transform="rotate(315) translate(0,-168)"/>
        <use href="#dot" transform="rotate(330) translate(0,-168)"/>
        <use href="#dot" transform="rotate(345) translate(0,-168)"/>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" fill="none">
  <defs>
    <filter id="softShadow" x="-20%" y="-10%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#3D2810" flood-opacity="0.38"/>
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="darkGoldFoil" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A56E22"/>
      <stop offset="35%" stop-color="#8C5A1A"/>
      <stop offset="65%" stop-color="#704812"/>
      <stop offset="100%" stop-color="#8C5A1A"/>
    </linearGradient>
    <linearGradient id="lightGoldFoil" x1="15%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%" stop-color="#F0D48A"/>
      <stop offset="30%" stop-color="#D8B164"/>
      <stop offset="55%" stop-color="#E8C878"/>
      <stop offset="100%" stop-color="#C49A42"/>
    </linearGradient>
    <linearGradient id="mandalaGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8C878"/>
      <stop offset="25%" stop-color="#D8B164"/>
      <stop offset="50%" stop-color="#A56A1E"/>
      <stop offset="75%" stop-color="#D8B164"/>
      <stop offset="100%" stop-color="#8C5A1A"/>
    </linearGradient>
    <radialGradient id="mandalaRadial" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#F5E0A0"/>
      <stop offset="45%" stop-color="#D8B164"/>
      <stop offset="100%" stop-color="#8C5A1A"/>
    </radialGradient>
    <path id="petal" d="M0,-88 C22,-52 28,-18 0,0 C-28,-18 -22,-52 0,-88 Z" fill="url(#mandalaGold)"/>
    <path id="dot" d="M0,-3 A3,3 0 1,1 0,3 A3,3 0 1,1 0,-3 Z" fill="#A56A1E"/>
  </defs>
  <g id="emblem-root" filter="url(#softShadow)">
    <g id="layer-02-outer-ring">
      <circle cx="256" cy="256" r="248" fill="url(#darkGoldFoil)"/>
      <path d="M 256 24 A 232 232 0 0 1 464 256" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.18" stroke-linecap="round"/>
    </g>
    <g id="layer-03-inner-ring">
      <circle cx="256" cy="256" r="228" fill="url(#lightGoldFoil)"/>
      <circle cx="256" cy="256" r="228" fill="none" stroke="#FFFFFF" stroke-width="0.75" stroke-opacity="0.25"/>
      <circle cx="256" cy="256" r="214" fill="none" stroke="#8C5A1A" stroke-width="0.5" stroke-opacity="0.35"/>
    </g>
    <g id="layer-04-white-center">
